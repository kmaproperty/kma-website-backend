name: Deploy to EC2

on:
  push:
    branches:
      - master
      - develop

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          # Branch routing: develop → deploy-dev.sh, anything else (master) → deploy.sh.
          # Earlier this used `master == 'master' && '' || '-dev'`, but '' is falsy in
          # GitHub Actions expressions, so master pushes silently routed to dev. Inverted
          # the condition so the falsy branch produces '' (i.e. the prod script).
          script: /home/ubuntu/deploy${{ github.ref_name == 'develop' && '-dev' || '' }}.sh
