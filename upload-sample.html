<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presigned URL File Upload - Sample</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .file-input-label:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .file-input-label.has-file {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .file-name {
            color: #4caf50;
            font-weight: 600;
            margin-top: 8px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 12px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-upload {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-upload:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(17, 153, 142, 0.3);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status.success {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            color: #2e7d32;
        }

        .status.error {
            background: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
        }

        .status.info {
            background: #e3f2fd;
            border: 2px solid #2196f3;
            color: #1565c0;
        }

        .status.show {
            display: block;
        }

        .api-url {
            font-size: 12px;
            color: #999;
            background: #f5f5f5;
            padding: 8px;
            border-radius: 5px;
            margin-top: 5px;
            word-break: break-all;
        }

        .progress {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loader.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 File Upload Demo</h1>
        <p class="subtitle">Upload files to S3 using presigned URLs</p>

        <form id="uploadForm">
            <div class="form-group">
                <label for="apiUrl">API Base URL</label>
                <input 
                    type="text" 
                    id="apiUrl" 
                    placeholder="http://localhost:3001" 
                    value="http://localhost:3001"
                >
                <span class="api-url">POST /uploads/presigned-url</span>
            </div>

            <div class="form-group">
                <label for="authToken">Authorization Token</label>
                <input 
                    type="text" 
                    id="authToken" 
                    placeholder="Enter your JWT token"
                >
            </div>

            <div class="form-group">
                <label for="folder">Folder (Optional)</label>
                <input 
                    type="text" 
                    id="folder" 
                    placeholder="properties, uploads, etc."
                    value="uploads"
                >
            </div>

            <div class="form-group">
                <label for="expiresIn">Expiration (seconds)</label>
                <input 
                    type="number" 
                    id="expiresIn" 
                    placeholder="3600" 
                    value="3600"
                    min="60"
                    max="36000"
                >
            </div>

            <div class="form-group">
                <label for="file">Select File</label>
                <div class="file-input-wrapper">
                    <input 
                        type="file" 
                        id="file" 
                        accept="image/jpeg,image/jpg,image/png,image/gif,image/webp"
                    >
                    <label for="file" class="file-input-label" id="fileLabel">
                        <div>
                            <div style="font-size: 48px; margin-bottom: 10px;">📎</div>
                            <div>Click to select or drag & drop</div>
                            <div style="font-size: 12px; color: #999; margin-top: 5px;">
                                PNG, JPG, JPEG, GIF, WebP only
                            </div>
                        </div>
                    </label>
                </div>
                <div id="fileName" class="file-name"></div>
            </div>

            <button type="button" class="btn-primary" id="generateBtn">
                🔑 Generate Presigned URL
            </button>

            <button type="button" class="btn-upload" id="uploadBtn" disabled>
                ⬆️ Upload to S3
            </button>

            <div class="progress" id="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="loader" id="loader">
                <div class="spinner"></div>
            </div>

            <div class="status" id="status"></div>
        </form>
    </div>

    <script>
        const fileInput = document.getElementById('file');
        const fileLabel = document.getElementById('fileLabel');
        const fileName = document.getElementById('fileName');
        const generateBtn = document.getElementById('generateBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const apiUrlInput = document.getElementById('apiUrl');
        const authTokenInput = document.getElementById('authToken');
        const folderInput = document.getElementById('folder');
        const expiresInInput = document.getElementById('expiresIn');
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loader');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');

        let presignedUrl = null;
        let selectedFile = null;

        // File input handling
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                fileLabel.classList.add('has-file');
                fileName.textContent = `✓ Selected: ${file.name} (${formatFileSize(file.size)})`;
                uploadBtn.disabled = true; // Need to generate presigned URL first
                hideStatus();
            }
        });

        // Drag and drop
        fileLabel.addEventListener('dragover', function(e) {
            e.preventDefault();
            fileLabel.style.borderColor = '#667eea';
        });

        fileLabel.addEventListener('dragleave', function(e) {
            e.preventDefault();
            fileLabel.style.borderColor = '#e0e0e0';
        });

        fileLabel.addEventListener('drop', function(e) {
            e.preventDefault();
            fileLabel.style.borderColor = '#e0e0e0';
            const file = e.dataTransfer.files[0];
            if (file && isValidImageType(file.type)) {
                fileInput.files = e.dataTransfer.files;
                selectedFile = file;
                fileLabel.classList.add('has-file');
                fileName.textContent = `✓ Selected: ${file.name} (${formatFileSize(file.size)})`;
                uploadBtn.disabled = true;
                hideStatus();
            } else {
                showStatus('Please select a valid image file (PNG, JPG, JPEG, GIF, WebP)', 'error');
            }
        });

        // Generate presigned URL
        generateBtn.addEventListener('click', async function() {
            if (!selectedFile) {
                showStatus('Please select a file first', 'error');
                return;
            }

            if (!authTokenInput.value.trim()) {
                showStatus('Please enter your authorization token', 'error');
                return;
            }

            const baseUrl = apiUrlInput.value.trim() || 'http://localhost:3001';
            const token = authTokenInput.value.trim();
            const folder = folderInput.value.trim() || 'uploads';
            const expiresIn = parseInt(expiresInInput.value) || 3600;

            showLoader();
            generateBtn.disabled = true;
            hideStatus();

            try {
                const response = await fetch(`${baseUrl}/uploads/presigned-url`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        filename: selectedFile.name,
                        contentType: selectedFile.type,
                        folder: folder,
                        expiresIn: expiresIn
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to generate presigned URL');
                }

                presignedUrl = data.data.url;
                showStatus(`✅ Presigned URL generated successfully! You can now upload.`, 'success');
                uploadBtn.disabled = false;
                uploadBtn.textContent = `⬆️ Upload ${selectedFile.name} to S3`;

            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
                uploadBtn.disabled = true;
            } finally {
                hideLoader();
                generateBtn.disabled = false;
            }
        });

        // Upload file
        uploadBtn.addEventListener('click', async function() {
            if (!presignedUrl || !selectedFile) {
                showStatus('Please generate presigned URL first', 'error');
                return;
            }

            showLoader();
            showProgress();
            uploadBtn.disabled = true;
            hideStatus();

            try {
                console.log('Uploading to:', presignedUrl);
                console.log('File type:', selectedFile.type);
                console.log('File size:', selectedFile.size);
                
                const response = await fetch(presignedUrl, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': selectedFile.type
                    },
                    body: selectedFile
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);

                updateProgress(100);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Upload error response:', errorText);
                    throw new Error(`Failed to upload file: ${response.status} ${response.statusText}`);
                }

                showStatus(`🎉 File uploaded successfully to S3!`, 'success');
                resetForm();

            } catch (error) {
                console.error('Upload error:', error);
                showStatus(`❌ Upload failed: ${error.message}`, 'error');
            } finally {
                hideLoader();
                hideProgress();
                uploadBtn.disabled = false;
            }
        });

        // Utility functions
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type} show`;
        }

        function hideStatus() {
            statusDiv.classList.remove('show');
        }

        function showLoader() {
            loader.classList.add('show');
        }

        function hideLoader() {
            loader.classList.remove('show');
        }

        function showProgress() {
            progress.style.display = 'block';
        }

        function hideProgress() {
            progress.style.display = 'none';
            progressBar.style.width = '0%';
        }

        function updateProgress(percent) {
            progressBar.style.width = percent + '%';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function isValidImageType(mimeType) {
            const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif', 'image/webp'];
            return validTypes.includes(mimeType);
        }

        function resetForm() {
            fileInput.value = '';
            fileLabel.classList.remove('has-file');
            fileName.textContent = '';
            presignedUrl = null;
            selectedFile = null;
            uploadBtn.textContent = '⬆️ Upload to S3';
            hideProgress();
        }
    </script>
</body>
</html>
